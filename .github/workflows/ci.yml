name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'docs/**'
      - 'blog/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'blog/**'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
